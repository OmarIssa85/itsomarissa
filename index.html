<title>itsomarissa — AI Creative</title>

<style>
  /* ============ TOKENS ============ */
  /* -------------------------------------------------------------------------
     BRAND PALETTE (teal). The three accent tokens are named --clay / --blue /
     --green for historical reasons but hold brand TEAL tones:
       --clay  = primary teal accent      (from swatch #74C1CA)
       --blue  = light "mist" tone         (from swatch #C1DEE6) — used for Video
       --green = deep teal tone            — used for Image
     Edit the six hex values in EACH theme block below to fine-tune the palette.
     ------------------------------------------------------------------------- */
  :root {
    --bg:        #f0f6f8;
    --bg-2:      #e3eef1;
    --surface:   #ffffff;
    --ink:       #0a1412;
    --ink-2:     #3d565e;
    --ink-3:     #6f8f96;
    --line:      #d3e2e7;
    --line-2:    #bed5dc;
    --clay:      #2c7a85;
    --clay-deep: #205e68;
    --blue:      #4f9aa6;
    --green:     #1f6e79;
    --on-accent: #ffffff;

    --sans: "Poppins", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --serif: "Lora", "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;

    --maxw: 1200px;
    --gutter: clamp(20px, 5vw, 64px);
    --radius: 18px;
    --radius-sm: 12px;
    --shadow: 0 1px 2px rgba(20,20,19,.04), 0 12px 32px -12px rgba(20,20,19,.14);
    --shadow-lift: 0 2px 6px rgba(20,20,19,.06), 0 28px 60px -20px rgba(20,20,19,.24);
    --ease: cubic-bezier(.22,.61,.36,1);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #0a1412;
      --bg-2:      #0f2830;
      --surface:   #123039;
      --ink:       #e7f3f5;
      --ink-2:     #9dbcc2;
      --ink-3:     #6e8e95;
      --line:      #1e3a42;
      --line-2:    #2a4a53;
      --clay:      #7ecbd4;
      --clay-deep: #5aa7b1;
      --blue:      #b4d8e1;
      --green:     #4fa7b1;
      --on-accent: #0a1412;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 16px 40px -16px rgba(0,0,0,.6);
      --shadow-lift: 0 2px 6px rgba(0,0,0,.4), 0 32px 70px -22px rgba(0,0,0,.7);
    }
  }
  /* explicit toggle overrides media query in both directions */
  :root[data-theme="light"] {
    --bg:#f0f6f8; --bg-2:#e3eef1; --surface:#ffffff; --ink:#0a1412; --ink-2:#3d565e;
    --ink-3:#6f8f96; --line:#d3e2e7; --line-2:#bed5dc; --clay:#2c7a85; --clay-deep:#205e68;
    --blue:#4f9aa6; --green:#1f6e79; --on-accent:#ffffff;
    --shadow: 0 1px 2px rgba(20,20,19,.04), 0 12px 32px -12px rgba(20,20,19,.14);
    --shadow-lift: 0 2px 6px rgba(20,20,19,.06), 0 28px 60px -20px rgba(20,20,19,.24);
  }
  :root[data-theme="dark"] {
    --bg:#0a1412; --bg-2:#0f2830; --surface:#123039; --ink:#e7f3f5; --ink-2:#9dbcc2;
    --ink-3:#6e8e95; --line:#1e3a42; --line-2:#2a4a53; --clay:#7ecbd4; --clay-deep:#5aa7b1;
    --blue:#b4d8e1; --green:#4fa7b1; --on-accent:#0a1412;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 16px 40px -16px rgba(0,0,0,.6);
    --shadow-lift: 0 2px 6px rgba(0,0,0,.4), 0 32px 70px -22px rgba(0,0,0,.7);
  }

  /* ============ BASE ============ */
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--serif);
    font-size: clamp(16px, 1.05vw, 18px);
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  h1,h2,h3,h4 { font-family: var(--sans); font-weight: 600; line-height: 1.06; letter-spacing: -.02em; text-wrap: balance; margin: 0; }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; display: block; }
  ::selection { background: var(--clay); color: var(--on-accent); }
  :focus-visible { outline: 2.5px solid var(--clay); outline-offset: 3px; border-radius: 4px; }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding-inline: var(--gutter); }
  .eyebrow {
    font-family: var(--mono); font-size: .72rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--ink-3); display: inline-flex; align-items: center; gap: .6em; margin: 0;
  }
  .eyebrow::before { content:""; width: 26px; height: 1px; background: var(--clay); display:inline-block; }
  .section { padding-block: clamp(72px, 11vw, 150px); position: relative; }

  /* reveal */
  .reveal { opacity: 0; transform: translateY(26px); transition: opacity .9s var(--ease), transform .9s var(--ease); }
  .reveal.in { opacity: 1; transform: none; }
  .reveal[data-d="1"]{ transition-delay:.08s } .reveal[data-d="2"]{ transition-delay:.16s }
  .reveal[data-d="3"]{ transition-delay:.24s } .reveal[data-d="4"]{ transition-delay:.32s }
  @media (prefers-reduced-motion: reduce){ .reveal{ opacity:1 !important; transform:none !important; } }

  /* ============ PROGRESS + NAV ============ */
  #progress { position: fixed; top: 0; left: 0; height: 3px; width: 0%; background: var(--clay); z-index: 100; transition: width .1s linear; }
  header.nav {
    position: sticky; top: 0; z-index: 90;
    backdrop-filter: saturate(140%) blur(14px);
    background: color-mix(in srgb, var(--bg) 78%, transparent);
    border-bottom: 1px solid transparent; transition: border-color .3s, background .3s;
  }
  header.nav.scrolled { border-bottom-color: var(--line); }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 68px; }
  .wordmark { font-family: var(--sans); font-weight: 600; letter-spacing: -.03em; font-size: 1.12rem; display: inline-flex; align-items: center; gap: .5em; }
  .wordmark .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--clay); box-shadow: 0 0 0 4px color-mix(in srgb, var(--clay) 22%, transparent); }
  .nav-links { display: flex; gap: 4px; align-items: center; }
  .nav-links a {
    font-family: var(--sans); font-size: .84rem; font-weight: 500; color: var(--ink-2);
    padding: 8px 13px; border-radius: 999px; position: relative; transition: color .25s, background .25s;
  }
  .nav-links a:hover { color: var(--ink); background: var(--bg-2); }
  .nav-links a.active { color: var(--ink); }
  .nav-links a.active::after {
    content:""; position:absolute; left: 13px; right: 13px; bottom: 2px; height: 2px; background: var(--clay); border-radius: 2px;
  }
  .nav-cta {
    font-family: var(--sans); font-weight: 600; font-size: .84rem; padding: 9px 17px !important;
    background: var(--ink) !important; color: var(--bg) !important;
  }
  .nav-cta:hover { background: var(--clay) !important; color: var(--on-accent) !important; }
  .theme-btn {
    width: 38px; height: 38px; border-radius: 999px; border: 1px solid var(--line-2); background: var(--surface);
    color: var(--ink); cursor: pointer; display: grid; place-items: center; margin-left: 6px; transition: border-color .25s, transform .25s;
  }
  .theme-btn:hover { border-color: var(--clay); transform: rotate(-18deg); }
  .theme-btn svg { width: 17px; height: 17px; }
  .nav-toggle { display: none; }
  @media (max-width: 840px){
    .nav-links { position: fixed; inset: 68px 0 auto 0; flex-direction: column; background: var(--bg);
      border-bottom: 1px solid var(--line); padding: 12px var(--gutter) 22px; gap: 2px; align-items: stretch;
      transform: translateY(-120%); transition: transform .4s var(--ease); }
    .nav-links.open { transform: none; }
    .nav-links a { padding: 13px; font-size: 1rem; }
    .nav-links a.active::after{ display:none; }
    .nav-cta { text-align: center; margin-top: 6px; }
    .nav-toggle { display: grid; place-items:center; width: 40px; height: 40px; border: 1px solid var(--line-2); border-radius: 10px; background: var(--surface); cursor: pointer; }
    .nav-toggle span { width: 18px; height: 2px; background: var(--ink); position: relative; transition: .3s; }
    .nav-toggle span::before, .nav-toggle span::after { content:""; position:absolute; left:0; width:18px; height:2px; background: var(--ink); transition:.3s; }
    .nav-toggle span::before{ top:-6px; } .nav-toggle span::after{ top:6px; }
  }

  /* ============ HERO ============ */
  .hero { position: relative; min-height: 100svh; display: flex; align-items: center; overflow: hidden; }
  #flow { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }
  .hero::after { /* soft vignette to seat text */
    content:""; position:absolute; inset:0; z-index:1; pointer-events:none;
    background: radial-gradient(120% 90% at 15% 40%, transparent 40%, color-mix(in srgb, var(--bg) 55%, transparent) 100%);
  }
  .hero-inner { position: relative; z-index: 2; padding-block: 120px 90px; }
  .hero h1 {
    font-size: clamp(3rem, 9.5vw, 8.2rem); letter-spacing: -.045em; line-height: .92; margin-top: 22px;
  }
  .hero h1 .serif { font-family: var(--serif); font-weight: 500; font-style: italic; letter-spacing: -.02em; color: var(--clay); }
  .hero-sub {
    font-family: var(--serif); font-size: clamp(1.05rem, 1.7vw, 1.4rem); color: var(--ink-2);
    max-width: 46ch; margin: 28px 0 0;
  }
  .hero-cta { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 40px; }
  .btn {
    font-family: var(--sans); font-weight: 600; font-size: .95rem; padding: 15px 26px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: .6em; cursor: pointer; border: 1px solid transparent;
    transition: transform .25s var(--ease), background .25s, color .25s, border-color .25s, box-shadow .25s;
  }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-primary:hover { background: var(--clay); color: var(--on-accent); transform: translateY(-3px); box-shadow: var(--shadow); }
  .btn-ghost { border-color: var(--line-2); color: var(--ink); background: color-mix(in srgb, var(--surface) 60%, transparent); }
  .btn-ghost:hover { border-color: var(--clay); color: var(--clay); transform: translateY(-3px); }
  .btn svg { width: 17px; height: 17px; }
  .hero-meta {
    position: absolute; z-index: 2; bottom: 30px; left: var(--gutter); right: var(--gutter);
    display: flex; justify-content: space-between; align-items: end; gap: 20px; flex-wrap: wrap;
    font-family: var(--mono); font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3);
  }
  .hero-meta .avail { display: inline-flex; align-items: center; gap: .6em; }
  .hero-meta .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 0 var(--green); animation: pulse 2.2s infinite; }
  @keyframes pulse { 0%{ box-shadow: 0 0 0 0 color-mix(in srgb,var(--green) 60%, transparent);} 70%{ box-shadow: 0 0 0 10px transparent;} 100%{ box-shadow:0 0 0 0 transparent;} }
  @media (prefers-reduced-motion: reduce){ .hero-meta .pulse{ animation: none; } }

  /* ============ MARQUEE ============ */
  .marquee { border-block: 1px solid var(--line); background: var(--bg-2); overflow: hidden; padding-block: 20px; }
  .marquee-track { display: flex; gap: 44px; width: max-content; animation: scroll 34s linear infinite; }
  .marquee:hover .marquee-track { animation-play-state: paused; }
  .marquee-track span { font-family: var(--sans); font-weight: 500; font-size: 1.05rem; color: var(--ink-2); display: inline-flex; align-items: center; gap: 44px; white-space: nowrap; }
  .marquee-track span::after { content:"✦"; color: var(--clay); font-size: .8rem; }
  @keyframes scroll { to { transform: translateX(-50%); } }
  @media (prefers-reduced-motion: reduce){ .marquee-track{ animation: none; } }

  /* ============ SECTION HEADS ============ */
  .sec-head { display: flex; justify-content: space-between; align-items: end; gap: 30px; flex-wrap: wrap; margin-bottom: clamp(34px, 5vw, 60px); }
  .sec-head h2 { font-size: clamp(2rem, 4.6vw, 3.4rem); letter-spacing: -.035em; }
  .sec-head p { max-width: 42ch; color: var(--ink-2); margin: 0; }

  /* ============ PROJECTS / FILTER GRID ============ */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
  .filter {
    font-family: var(--sans); font-weight: 500; font-size: .86rem; padding: 9px 18px; border-radius: 999px;
    border: 1px solid var(--line-2); background: var(--surface); color: var(--ink-2); cursor: pointer; transition: .25s;
  }
  .filter:hover { color: var(--ink); border-color: var(--ink-3); }
  .filter.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: clamp(16px, 2vw, 26px); }
  .card {
    position: relative; border-radius: var(--radius); overflow: hidden; background: var(--surface);
    border: 1px solid var(--line); box-shadow: var(--shadow); cursor: pointer;
    transition: transform .5s var(--ease), box-shadow .5s var(--ease), opacity .45s, filter .45s;
    display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lift); }
  .card.hide { display: none; }
  .card .thumb { position: relative; aspect-ratio: 4/3; overflow: hidden; }
  .card.tall .thumb { aspect-ratio: 3/4; }
  .card .art { position: absolute; inset: 0; transition: transform .8s var(--ease); }
  .card:hover .art { transform: scale(1.06); }
  .badge {
    position: absolute; top: 12px; left: 12px; z-index: 3; font-family: var(--mono); font-size: .66rem;
    letter-spacing: .12em; text-transform: uppercase; padding: 5px 10px; border-radius: 999px;
    backdrop-filter: blur(6px); background: color-mix(in srgb, var(--bg) 70%, transparent); border: 1px solid var(--line);
    display: inline-flex; align-items: center; gap: .5em;
  }
  .badge .tag-dot { width: 7px; height: 7px; border-radius: 50%; }
  .tag-video .tag-dot{ background: var(--blue); } .tag-image .tag-dot{ background: var(--green); }
  .tag-both .tag-dot{ background: var(--clay); }
  .play {
    position: absolute; inset: 0; z-index: 3; display: grid; place-items: center; opacity: 0; transition: opacity .35s;
  }
  .card:hover .play { opacity: 1; }
  .play span {
    width: 62px; height: 62px; border-radius: 50%; background: color-mix(in srgb, var(--bg) 55%, transparent);
    backdrop-filter: blur(6px); display: grid; place-items: center; border: 1px solid var(--line);
  }
  .play span::before { content:""; border-left: 15px solid var(--ink); border-block: 9px solid transparent; margin-left: 4px; }
  .card .meta { padding: 18px 20px 20px; display: flex; flex-direction: column; gap: 6px; }
  .card .meta h3 { font-size: 1.18rem; letter-spacing: -.02em; }
  .card .meta .cap { font-family: var(--mono); font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); }
  /* col spans */
  .c-6 { grid-column: span 6; } .c-4 { grid-column: span 4; } .c-8 { grid-column: span 8; } .c-12 { grid-column: span 12; }
  @media (max-width: 860px){ .c-6,.c-8{ grid-column: span 6; } .c-4{ grid-column: span 6; } }
  @media (max-width: 560px){ .grid{ grid-template-columns: repeat(6,1fr);} .c-6,.c-8,.c-4,.c-12{ grid-column: span 6; } }

  /* ============ IMAGE MASONRY ============ */
  .masonry { columns: 3; column-gap: clamp(14px, 1.6vw, 22px); }
  @media (max-width: 820px){ .masonry{ columns: 2; } }
  @media (max-width: 480px){ .masonry{ columns: 1; } }
  .tile {
    break-inside: avoid; margin-bottom: clamp(14px,1.6vw,22px); border-radius: var(--radius-sm); overflow: hidden;
    position: relative; cursor: pointer; border: 1px solid var(--line); box-shadow: var(--shadow);
  }
  .tile .art { transition: transform .7s var(--ease); }
  .tile:hover .art { transform: scale(1.05); }
  .tile .tcap {
    position: absolute; inset: auto 0 0 0; padding: 26px 16px 14px; color: #fff;
    font-family: var(--mono); font-size: .72rem; letter-spacing: .08em; text-transform: uppercase;
    background: linear-gradient(transparent, rgba(0,0,0,.6)); opacity: 0; transform: translateY(8px); transition: .4s;
  }
  .tile:hover .tcap { opacity: 1; transform: none; }

  /* ============ SERVICES ============ */
  .svc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(16px,2vw,24px); }
  @media (max-width: 860px){ .svc-grid{ grid-template-columns: 1fr; } }
  .svc {
    border: 1px solid var(--line); border-radius: var(--radius); padding: 30px 28px; background: var(--surface);
    display: flex; flex-direction: column; gap: 14px; position: relative; overflow: hidden;
    transition: transform .4s var(--ease), box-shadow .4s var(--ease), border-color .4s;
  }
  .svc:hover { transform: translateY(-5px); box-shadow: var(--shadow-lift); border-color: var(--line-2); }
  .svc::before { content:""; position:absolute; inset: 0 auto 0 0; width: 3px; background: var(--accent, var(--clay)); transform: scaleY(0); transform-origin: top; transition: transform .5s var(--ease); }
  .svc:hover::before { transform: scaleY(1); }
  .svc .num { font-family: var(--mono); font-size: .72rem; letter-spacing: .18em; color: var(--ink-3); }
  .svc .icn { width: 46px; height: 46px; border-radius: 12px; display: grid; place-items: center; background: color-mix(in srgb, var(--accent, var(--clay)) 14%, transparent); color: var(--accent, var(--clay)); }
  .svc .icn svg { width: 24px; height: 24px; }
  .svc h3 { font-size: 1.32rem; letter-spacing: -.02em; }
  .svc p { margin: 0; color: var(--ink-2); font-size: .98rem; }
  .svc ul { margin: 6px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 7px; }
  .svc li { font-family: var(--sans); font-size: .84rem; color: var(--ink-2); display: flex; gap: .6em; align-items: center; }
  .svc li::before { content:""; width: 5px; height: 5px; border-radius:50%; background: var(--accent, var(--clay)); flex: none; }

  /* ============ ABOUT + CONTACT ============ */
  .about-grid { display: grid; grid-template-columns: 1fr 1.15fr; gap: clamp(30px, 5vw, 72px); align-items: center; }
  @media (max-width: 880px){ .about-grid{ grid-template-columns: 1fr; } }
  .portrait { position: relative; aspect-ratio: 4/5; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--line); box-shadow: var(--shadow-lift); }
  .portrait .label { position: absolute; bottom: 14px; left: 14px; font-family: var(--mono); font-size:.68rem; letter-spacing:.1em; text-transform: uppercase; color: #fff; background: rgba(0,0,0,.4); backdrop-filter: blur(4px); padding: 6px 11px; border-radius: 999px; }
  .about-body h2 { font-size: clamp(1.9rem, 4vw, 3rem); letter-spacing: -.035em; margin-bottom: 20px; }
  .about-body p { color: var(--ink-2); margin: 0 0 16px; }
  .about-body .lead { font-size: 1.16rem; color: var(--ink); }
  .stats { display: flex; gap: 34px; flex-wrap: wrap; margin: 30px 0; }
  .stat .n { font-family: var(--sans); font-weight: 600; font-size: 2.3rem; letter-spacing: -.03em; color: var(--clay); font-variant-numeric: tabular-nums; }
  .stat .l { font-family: var(--mono); font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3); }

  /* contact band */
  .contact { background: var(--ink); color: var(--bg); border-radius: clamp(20px, 3vw, 34px); padding: clamp(40px, 6vw, 78px); position: relative; overflow: hidden; }
  .contact .glow { position: absolute; width: 480px; height: 480px; border-radius: 50%; filter: blur(90px); opacity: .5; background: radial-gradient(circle, var(--clay), transparent 70%); top: -140px; right: -100px; pointer-events: none; }
  .contact h2 { font-size: clamp(2.1rem, 5.5vw, 4rem); letter-spacing: -.04em; color: var(--bg); max-width: 16ch; }
  .contact p { color: color-mix(in srgb, var(--bg) 72%, transparent); max-width: 44ch; margin: 18px 0 34px; }
  .contact-actions { display: flex; flex-wrap: wrap; gap: 14px; position: relative; z-index: 2; }
  .btn-clay { background: var(--clay); color: var(--on-accent); }
  .btn-clay:hover { transform: translateY(-3px); box-shadow: 0 18px 40px -14px var(--clay); }
  .btn-outline { border-color: color-mix(in srgb, var(--bg) 40%, transparent); color: var(--bg); }
  .btn-outline:hover { border-color: var(--bg); transform: translateY(-3px); }
  .socials { display: flex; gap: 10px; margin-top: 40px; position: relative; z-index: 2; flex-wrap: wrap; }
  .socials a { width: 44px; height: 44px; border-radius: 12px; border: 1px solid color-mix(in srgb, var(--bg) 26%, transparent); display: grid; place-items: center; color: var(--bg); transition: .28s; }
  .socials a:hover { background: var(--clay); border-color: var(--clay); color: var(--on-accent); transform: translateY(-3px); }
  .socials svg { width: 19px; height: 19px; }

  /* ============ FOOTER ============ */

  document.addEventListener("keydown", function(e){ if(e.key === "Escape") closeLB(); });

  /* ---- header / nav ---- */
  $("wordmark").textContent = CONTENT.brand;
  $("navLinks").innerHTML = CONTENT.nav.map(function(n){
    return '<a href="'+n.href+'" class="'+(n.cta ? "nav-cta" : "navlink")+'">'+esc(n.label)+'</a>';
  }).join("");

  /* ---- hero ---- */
  $("heroEyebrow").textContent = CONTENT.hero.eyebrow;
  $("heroHeadline").innerHTML = CONTENT.hero.headlineHTML;
  $("heroSub").innerHTML = CONTENT.hero.subHTML;
  $("heroAvail").textContent = CONTENT.hero.availability;
  $("heroCta").innerHTML =
    '<a href="#work" class="btn btn-primary">'+esc(CONTENT.hero.primaryCta)+ICONS.arrow+'</a>'+
    '<a href="#contact" class="btn btn-ghost">'+esc(CONTENT.hero.secondaryCta)+'</a>';

  /* ---- marquee (duplicated for a seamless loop) ---- */
  var one = CONTENT.tools.map(function(t){ return "<span>"+esc(t)+"</span>"; }).join("");
  $("mtrack").innerHTML = one + one;

  /* ---- section headers ---- */
  ["work","video","image","services","about","contact"].forEach(function(key){
    var s = CONTENT.sections[key];
    $(key+"Eyebrow").textContent = s.eyebrow;
    $(key+"Title").innerHTML = s.titleHTML;
    if(s.desc && $(key+"Desc")) $(key+"Desc").textContent = s.desc;
  });

  /* ---- card builder (work + video) ---- */
  function buildCard(item, seed, forceType){
    var type = forceType || item.type;
    var isVid = (type === "video" || type === "both");
    var tagClass = type === "both" ? "tag-both" : (type === "video" ? "tag-video" : "tag-image");
    var label = type === "both" ? "Video + Image" : (type === "video" ? "Video" : "Image");
    var card = document.createElement("div");
    card.className = "card reveal " + (item.span || "c-4");
    card.dataset.tag = type;
    var thumb = document.createElement("div"); thumb.className = "thumb";
    thumb.appendChild(art(seed, item.img));
    thumb.insertAdjacentHTML("beforeend",
      '<span class="badge '+tagClass+'"><span class="tag-dot"></span>'+label+'</span>' +
      (isVid ? '<div class="play"><span></span></div>' : ''));
    var meta = document.createElement("div"); meta.className = "meta";
    meta.innerHTML = '<div class="cap">'+esc(item.caption)+'</div><h3>'+esc(item.title)+'</h3>';
    card.appendChild(thumb); card.appendChild(meta);
    card.addEventListener("click", function(){ openLB(item, seed); });
    return card;
  }

  var wg = $("workGrid");
  CONTENT.work.forEach(function(w, i){ wg.appendChild(buildCard(w, i+1)); });

  var vg = $("videoGrid");
  CONTENT.videos.forEach(function(v, i){ vg.appendChild(buildCard(v, i+11, "video")); });

  /* ---- image masonry ---- */
  var ig = $("imageGrid");
  CONTENT.images.forEach(function(m, i){
    var tile = document.createElement("div"); tile.className = "tile reveal";
    var media;
    if(m.img){
      media = document.createElement("img");        // real photo → shows at full aspect
      media.className = "art"; media.src = m.img; media.alt = m.title; media.loading = "lazy";
      media.style.cssText = "display:block;width:100%;height:auto;";
    } else {
      media = art(i+21);                             // no image → teal gradient placeholder
      media.style.position = "relative"; media.style.width = "100%"; media.style.height = (m.height || 300) + "px";
    }
    tile.appendChild(media);
    tile.insertAdjacentHTML("beforeend", '<div class="tcap">'+esc(m.title)+'</div>');
    tile.addEventListener("click", function(){ openLB({ title: m.title, caption: m.caption || "Still · Image", img: m.img, desc: m.desc }, i+21); });
    ig.appendChild(tile);
  });

  /* ---- filters (only show buttons for media types actually present) ---- */
  var present = {}; CONTENT.work.forEach(function(w){ present[w.type] = true; });
  var allDefs = [
    { f: "all",   label: "All work" },
    { f: "both",  label: "Campaigns" },
    { f: "video", label: "Video" },
    { f: "image", label: "Image" }
  ];
  var filterDefs = Object.keys(present).length > 1
    ? allDefs.filter(function(d){ return d.f === "all" || present[d.f]; })
    : [];
  $("workFilters").innerHTML = filterDefs.map(function(d, i){
    return '<button class="filter'+(i===0?" active":"")+'" data-f="'+d.f+'">'+d.label+'</button>';
  }).join("");
  var filters = document.querySelectorAll(".filter");
  filters.forEach(function(btn){
    btn.addEventListener("click", function(){
      filters.forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      var f = btn.dataset.f;
      document.querySelectorAll("#workGrid .card").forEach(function(c){
        c.classList.toggle("hide", !(f === "all" || c.dataset.tag === f));
      });
    });
  });

  /* ---- services ---- */
  var sg = $("svcGrid");
  CONTENT.services.forEach(function(s, i){
    var el = document.createElement("div");
    el.className = "svc reveal"; el.dataset.d = String((i%3)+1);
    el.style.setProperty("--accent", "var(--"+(s.accent||"clay")+")");
    el.innerHTML =
      '<div class="icn">'+(ICONS[s.icon]||ICONS.direction)+'</div>'+
      '<span class="num">'+esc(s.num)+'</span>'+
      '<h3>'+esc(s.title)+'</h3>'+
      '<p>'+esc(s.desc)+'</p>'+
      '<ul>'+ s.points.map(function(p){ return "<li>"+esc(p)+"</li>"; }).join("") +'</ul>';
    sg.appendChild(el);
  });

  /* ---- about ---- */
  $("portraitLabel").textContent = CONTENT.about.portraitLabel;
  $("portrait").insertBefore(art(6, CONTENT.about.portrait), $("portraitLabel"));
  var ab = '<p class="lead">'+esc(CONTENT.about.lead)+'</p>';
  CONTENT.about.paragraphs.forEach(function(p){ ab += "<p>"+esc(p)+"</p>"; });
  $("aboutBody").innerHTML = ab;
  $("aboutStats").innerHTML = CONTENT.about.stats.map(function(s){
    return '<div class="stat"><div class="n">'+esc(s.n)+'</div><div class="l">'+esc(s.l)+'</div></div>';
  }).join("");
  $("aboutCta").innerHTML = esc(CONTENT.about.cta) + ICONS.arrow;

  /* ---- contact ---- */
  var email = CONTENT.contact.email;
  $("contactEmail").href = "mailto:" + email + "?subject=Project%20inquiry";
  $("contactEmailLabel").textContent = email;
  var soc = CONTENT.contact.socials;
  $("socials").innerHTML = Object.keys(soc).map(function(k){
    if(soc[k] && ICONS[k]){
      return '<a href="'+soc[k]+'" target="_blank" rel="noopener" aria-label="'+k+'">'+ICONS[k]+'</a>';
    }
    return "";
  }).join("");

  /* ---- footer ---- */
  $("footLeft").textContent = CONTENT.footerLeft;
  $("footMid").textContent = CONTENT.footerMid;

  /* ---- reveal on scroll (after everything is in the DOM) ---- */
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target); } });
  }, { threshold: .12, rootMargin: "0px 0px -8% 0px" });
  document.querySelectorAll(".reveal:not(.in)").forEach(function(el){ io.observe(el); });

  /* ---- progress bar + active nav link ---- */
  var nav = $("nav"), prog = $("progress");
  var sections = ["work","video","image","services","about","contact"].map($);
  var links = {}; document.querySelectorAll(".navlink").forEach(function(l){ links[l.getAttribute("href").slice(1)] = l; });
  function onScroll(){
    var st = window.scrollY, h = document.documentElement.scrollHeight - window.innerHeight;
    prog.style.width = (h > 0 ? (st / h * 100) : 0) + "%";
    nav.classList.toggle("scrolled", st > 10);
    var cur = "";
    sections.forEach(function(s){ if(s && s.getBoundingClientRect().top < window.innerHeight * 0.4) cur = s.id; });
    Object.keys(links).forEach(function(k){ links[k].classList.toggle("active", k === cur); });
  }
  window.addEventListener("scroll", onScroll, { passive: true }); onScroll();

  /* ---- mobile nav ---- */
  var toggle = $("navToggle"), nl = $("navLinks");
  toggle.addEventListener("click", function(){ nl.classList.toggle("open"); });
  nl.querySelectorAll("a").forEach(function(a){ a.addEventListener("click", function(){ nl.classList.remove("open"); }); });

  /* ---- theme toggle ---- */
  var themeBtn = $("theme"), root = document.documentElement;
  function isDark(){
    var t = root.getAttribute("data-theme");
    if(t) return t === "dark";
    return window.matchMedia("(prefers-color-scheme: dark)").matches;
  }
  function setIcon(){ themeBtn.innerHTML = isDark() ? ICONS.moon : ICONS.sun; }
  themeBtn.addEventListener("click", function(){
    root.setAttribute("data-theme", isDark() ? "light" : "dark");
    setIcon();
  });
  setIcon();

  /* ---- hero generative flow field ---- */
  var cv = $("flow"), ctx = cv.getContext("2d");
  var W, H, dpr, particles = [], t = 0, mx = .5, my = .5, raf, running = false;
  function accentColors(){
    var cs = getComputedStyle(root);
    return [cs.getPropertyValue("--clay").trim(), cs.getPropertyValue("--blue").trim(), cs.getPropertyValue("--green").trim()];
  }
  var cols = accentColors();
  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = cv.clientWidth; H = cv.clientHeight;
    cv.width = W * dpr; cv.height = H * dpr; ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  function seedParticles(){
    var count = Math.min(90, Math.floor(W * H / 14000));
    particles = [];
    for(var i = 0; i < count; i++){
      particles.push({ x: Math.random()*W, y: Math.random()*H, c: cols[i%3], r: 0.6 + Math.random()*1.8, sp: 0.2 + Math.random()*0.6 });
    }
  }
  function fieldAngle(x, y){
    return Math.sin(x*0.0016 + t*0.0006) + Math.cos(y*0.0018 - t*0.0005) + (mx-.5)*1.2 + Math.sin((x+y)*0.001);
  }
  function frame(){
    t++; ctx.clearRect(0, 0, W, H);
    for(var i = 0; i < particles.length; i++){
      var p = particles[i], a = fieldAngle(p.x, p.y) * Math.PI;
      p.x += Math.cos(a)*p.sp*1.4; p.y += Math.sin(a)*p.sp*1.4;
      if(p.x < -20) p.x = W+20; if(p.x > W+20) p.x = -20; if(p.y < -20) p.y = H+20; if(p.y > H+20) p.y = -20;
      var g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r*22);
      g.addColorStop(0, p.c+"cc"); g.addColorStop(1, p.c+"00");
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x, p.y, p.r*22, 0, 6.2832); ctx.fill();
    }
    raf = requestAnimationFrame(frame);
  }
  function staticField(){
    ctx.clearRect(0, 0, W, H);
    for(var i = 0; i < 40; i++){
      var x = Math.random()*W, y = Math.random()*H, c = cols[i%3], r = 30 + Math.random()*40;
      var g = ctx.createRadialGradient(x, y, 0, x, y, r); g.addColorStop(0, c+"33"); g.addColorStop(1, c+"00");
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, 6.2832); ctx.fill();
    }
  }
  function start(){ if(reduce || running) return; running = true; frame(); }
  function stop(){ running = false; if(raf) cancelAnimationFrame(raf); }
  function boot(){ resize(); cols = accentColors(); if(reduce){ staticField(); } else { seedParticles(); start(); } }
  var heroEl = document.querySelector(".hero");
  if(heroEl && "IntersectionObserver" in window){
    new IntersectionObserver(function(es){ es.forEach(function(e){ e.isIntersecting ? start() : stop(); }); }, { threshold: .02 }).observe(heroEl);
  }
  document.addEventListener("visibilitychange", function(){ document.hidden ? stop() : start(); });
  window.addEventListener("resize", function(){ resize(); if(reduce){ staticField(); } else { seedParticles(); } });
  window.addEventListener("pointermove", function(e){ mx = e.clientX/window.innerWidth; my = e.clientY/window.innerHeight; }, { passive: true });
  new MutationObserver(function(){ cols = accentColors(); }).observe(root, { attributes: true, attributeFilter: ["data-theme"] });
  boot();
})();
</script>
